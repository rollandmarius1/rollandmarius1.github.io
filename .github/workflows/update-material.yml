name: Mettre à jour matériel pédagogique

# Se déclenche uniquement quand le dossier materiel_pedagogique est modifié
on:
  push:
    branches: [main]
    paths:
      - 'materiel_pedagogique/**'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Récupère le code du dépôt
      - uses: actions/checkout@v4

      # Installe Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Lance la mise à jour du JSON
      - run: python scripts/update_material.py

      # Commit et push le JSON mis à jour
      - name: Commit teaching.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/teaching.json
          git diff --staged --quiet || git commit -m "Auto-update teaching.json from materiel_pedagogique"
          git push
