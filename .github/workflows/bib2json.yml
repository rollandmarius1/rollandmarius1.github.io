name: Convertir BibTeX en JSON

# Se déclenche uniquement quand biblio.bib est modifié sur main
on:
  push:
    branches: [main]
    paths:
      - 'biblio.bib'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      # Récupère le code du dépôt
      - uses: actions/checkout@v4

      # Installe Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Installe bibtexparser
      - run: pip install bibtexparser

      # Lance la conversion
      - run: python scripts/bib2json.py biblio.bib data/publications.json

      # Commit et push le JSON généré
      - name: Commit publications.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/publications.json
          git diff --staged --quiet || git commit -m "Auto-update publications.json from biblio.bib"
          git push
